compilation_database_dir: build
output_directory: diagrams

query_driver: /usr/bin/g++

add_compile_flags:
  - "-I/usr/include"
  - "-I/usr/include/c++/15.2.1"
  - "-I/usr/include/c++/15.2.1/x86_64-pc-linux-gnu"

remove_compile_flags:
  - "-mno-direct-extern-access"

diagrams:
  vaultea_class_diagram:
    type: class

    glob:
      - src/core/**/*.cpp
      - src/crypto/**/*.cpp
      - src/index/**/*.cpp
      - src/managers/**/*.cpp
      - src/models/**/*.cpp
      - src/pipeline/**/*.cpp
      - src/storage/**/*.cpp
      - src/util/**/*.cpp

    exclude:
      namespaces:
        - std
        - Qt
        - absl

    include:
      access:
        - public
        - protected
        - private

    include_relations_also_as_members: false

    generate_packages: true
    package_type: directory
